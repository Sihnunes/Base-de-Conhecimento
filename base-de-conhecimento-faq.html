<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de FAQ · Atendimento Tania Bulhões</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#faf7f1;
    --card:#ffffff;
    --forest:#2c4f3a;
    --forest-deep:#1e3a2a;
    --gold:#b89a5e;
    --gold-soft:#e4d6b6;
    --ink:#282a24;
    --muted:#8a8577;
    --border:#e3ddd0;
    --danger:#a24a3d;
    --font-display:'Cormorant Garamond', serif;
    --font-body:'DM Sans', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--cream);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased;}

  /* ---------- Top bar ---------- */
  .topbar{display:flex;align-items:center;gap:16px;padding:18px 28px;background:var(--forest);color:#f4efe2;flex-wrap:wrap;}
  .brand{display:flex;align-items:baseline;gap:10px;margin-right:auto;}
  .brand .mark{width:9px;height:9px;background:var(--gold);border-radius:1px;display:inline-block;transform:rotate(45deg);}
  .brand h1{font-family:var(--font-display);font-weight:600;font-size:22px;letter-spacing:.02em;margin:0;color:#fbf8f1;}
  .brand span{font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--gold-soft);}
  .search-wrap{position:relative;flex:1;min-width:220px;max-width:360px;}
  .search-wrap input{width:100%;padding:9px 14px 9px 34px;border-radius:20px;border:1px solid rgba(244,239,226,.25);background:rgba(244,239,226,.08);color:#fbf8f1;font-family:var(--font-body);font-size:13px;outline:none;}
  .search-wrap input::placeholder{color:rgba(244,239,226,.55);}
  .search-wrap input:focus{border-color:var(--gold);background:rgba(244,239,226,.14);}
  .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:13px;height:13px;color:rgba(244,239,226,.6);pointer-events:none;}
  .search-results{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--card);border:1px solid var(--border);border-radius:10px;box-shadow:0 12px 28px rgba(30,58,42,.18);max-height:320px;overflow-y:auto;z-index:40;display:none;}
  .search-results.open{display:block;}
  .search-result{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;}
  .search-result:last-child{border-bottom:none;}
  .search-result:hover{background:var(--cream);}
  .search-result .num{font-family:var(--font-display);font-style:italic;color:var(--gold);font-size:12px;margin-right:6px;}
  .search-result .title{font-weight:600;font-size:13.5px;color:var(--forest-deep);}
  .search-result .snippet{font-size:12px;color:var(--muted);margin-top:2px;}
  .search-empty{padding:14px;font-size:12.5px;color:var(--muted);}

  .actions{display:flex;gap:8px;flex-wrap:wrap;}
  .btn{font-family:var(--font-body);font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:20px;border:1px solid rgba(244,239,226,.3);background:transparent;color:#f4efe2;cursor:pointer;display:inline-flex;align-items:center;gap:6px;white-space:nowrap;transition:background .15s ease;}
  .btn:hover{background:rgba(244,239,226,.12);}
  .btn.primary{background:var(--gold);border-color:var(--gold);color:var(--forest-deep);}
  .btn.primary:hover{background:#c7ac72;}
  .btn.danger-text{color:var(--danger);border-color:transparent;padding:5px 8px;}
  .btn.danger-text:hover{background:#f5e7e3;}
  .admin-btn{font-family:var(--font-body);font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:20px;border:1px solid rgba(244,239,226,.3);background:transparent;color:#f4efe2;cursor:pointer;white-space:nowrap;}
  .gh-modal-overlay{position:fixed;inset:0;background:rgba(30,26,20,.55);z-index:200;display:none;align-items:center;justify-content:center;}
  .gh-modal{background:var(--cream);border-radius:14px;padding:28px 30px;width:min(420px,90vw);box-shadow:0 20px 50px rgba(0,0,0,.3);}
  .gh-modal h3{font-family:var(--font-head);font-size:20px;color:var(--forest-deep);margin:0 0 16px;font-weight:600;}
  .gh-field{margin-bottom:12px;}
  .gh-field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;margin-bottom:5px;}
  .gh-input{width:100%;box-sizing:border-box;border:1px solid var(--border);border-radius:8px;padding:8px 10px;font-family:var(--font-body);font-size:13px;color:var(--ink);background:var(--card);outline:none;}
  .gh-input:focus{border-color:var(--gold);}
  .gh-status{font-size:12px;margin:10px 0 4px;min-height:16px;color:var(--muted);}
  .gh-modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;}
  .gh-modal-actions .btn,.gh-modal-actions .btn.primary{color:var(--forest-deep);border-color:var(--border);}
  .gh-modal-actions .btn.primary{background:var(--gold);border-color:var(--gold);}
  .gh-modal-actions .btn:not(.primary){background:transparent;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--forest-deep);color:#f4efe2;padding:12px 20px;border-radius:10px;font-size:13px;font-family:var(--font-body);box-shadow:0 10px 30px rgba(0,0,0,.25);opacity:0;transition:opacity .2s ease,transform .2s ease;z-index:300;pointer-events:none;max-width:80vw;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .admin-btn.unlocked{background:#5a9c73;border-color:#5a9c73;color:#fff;}
  .admin-btn:hover{filter:brightness(1.08);}
  input[type=file]{display:none;}

  /* ---------- Layout: two columns ---------- */
  html,body{height:100%;overflow:hidden;}
  .layout{display:grid;grid-template-columns:460px 1fr;height:calc(100vh - 68px);}
  @media (max-width: 860px){.layout{grid-template-columns:1fr;height:auto;}
    html,body{height:auto;overflow:visible;}
  }

  .col-tree{background:#f2ede2;border-right:1px solid var(--border);padding:18px 12px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--gold) transparent;}
  .col-tree::-webkit-scrollbar{width:8px;}
  .col-tree::-webkit-scrollbar-track{background:transparent;}
  .col-tree::-webkit-scrollbar-thumb{background:var(--gold-soft);border-radius:10px;}
  .col-tree::-webkit-scrollbar-thumb:hover{background:var(--gold);}
  .col-label{font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);padding:0 8px 10px;font-weight:700;}
  .readonly-banner{background:var(--gold-soft);color:var(--forest-deep);font-size:11.5px;font-weight:600;padding:8px 10px;border-radius:8px;margin-bottom:12px;text-align:center;}

  .tree-section{margin-bottom:6px;}
  .tree-section-head{display:flex;align-items:center;gap:8px;padding:9px 8px;border-radius:0 8px 8px 0;cursor:pointer;position:relative;}
  .tree-section-head .bar{width:4px;align-self:stretch;border-radius:2px;position:absolute;left:0;top:3px;bottom:3px;}
  .tree-section-head:hover{background:rgba(255,255,255,.65);}
  .chevron{width:14px;text-align:center;color:var(--gold);font-size:12px;flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;transition:transform .15s ease;}
  .chevron.expanded{transform:rotate(90deg);}
  .tree-section-head .name{font-family:var(--font-body);font-weight:600;font-size:13.5px;color:var(--forest-deep);flex:1;background:transparent;border:none;outline:none;padding:2px 0;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .tree-section-head .count{font-size:11px;color:var(--muted);flex-shrink:0;}
  .section-controls{display:flex;gap:2px;opacity:0;transition:opacity .12s;position:absolute;right:6px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.92);border-radius:6px;padding-left:6px;}
  .tree-section-head:hover .section-controls{opacity:1;}
  .icon-btn{width:19px;height:19px;border:none;background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px;font-size:11.5px;}
  .icon-btn:hover{background:var(--border);color:var(--forest-deep);}
  .swatches{display:none;gap:5px;padding:6px 10px 8px 30px;flex-wrap:wrap;}
  .swatches.open{display:flex;}
  .swatch{width:15px;height:15px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
  .swatch.selected{border-color:var(--forest-deep);}

  .tree-pages{margin-left:20px;padding-left:12px;border-left:2px solid var(--border);margin-bottom:6px;}
  .tree-page-row{display:flex;align-items:center;gap:8px;padding:8px 9px;border-radius:7px;cursor:pointer;position:relative;}
  .tree-page-row:hover{background:rgba(255,255,255,.75);}
  .tree-page-row.active{background:var(--card);box-shadow:0 1px 4px rgba(44,79,58,.12);}
  .tree-page-row .num{font-family:var(--font-display);font-style:italic;color:var(--gold);font-size:13px;min-width:26px;flex-shrink:0;}
  .tree-page-row .title{font-size:12.5px;color:var(--ink);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .page-controls{display:flex;gap:1px;opacity:0;transition:opacity .12s;position:absolute;right:6px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.92);border-radius:6px;padding-left:6px;}
  .tree-page-row:hover .page-controls{opacity:1;}
  .add-page-btn-inline{width:100%;text-align:left;padding:7px 8px;margin-top:2px;border:1px dashed var(--border);border-radius:7px;background:transparent;color:var(--forest);font-family:var(--font-body);font-size:11.5px;font-weight:600;cursor:pointer;}
  .add-page-btn-inline:hover{background:var(--card);}
  .empty-hint-inline{color:var(--muted);font-size:11.5px;padding:6px 8px;font-style:italic;}

  .add-section-btn{width:100%;text-align:left;padding:10px 12px;margin-top:6px;border:1px dashed var(--border);border-radius:8px;background:transparent;color:var(--forest);font-family:var(--font-body);font-size:12.5px;font-weight:600;cursor:pointer;}
  .add-section-btn:hover{background:var(--card);}

  /* ---------- Right panel: content ---------- */
  .col-editor{padding:30px 48px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--gold-soft) transparent;}
  .col-editor::-webkit-scrollbar{width:8px;}
  .col-editor::-webkit-scrollbar-track{background:transparent;}
  .col-editor::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px;}
  .col-editor::-webkit-scrollbar-thumb:hover{background:var(--gold-soft);}
  .editor-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--muted);text-align:center;gap:8px;}
  .editor-empty .big-num{font-family:var(--font-display);font-style:italic;font-size:44px;color:var(--gold-soft);}
  .editor-topline{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
  .editor-topline .catalog-num{font-family:var(--font-display);font-style:italic;color:var(--gold);font-size:19px;}
  .editor-topline .section-name{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);font-weight:700;}
  .title-input{width:100%;border:none;background:transparent;outline:none;font-family:var(--font-display);font-weight:600;font-size:32px;color:var(--forest-deep);padding:2px 0 12px;border-bottom:2px solid var(--border);margin-bottom:20px;max-width:680px;}
  .title-input:focus{border-bottom-color:var(--gold);}
  .title-static{font-family:var(--font-display);font-weight:600;font-size:32px;color:var(--forest-deep);padding:2px 0 12px;border-bottom:2px solid var(--border);margin-bottom:20px;max-width:680px;}
  .field-label{font-size:10.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:700;margin-bottom:8px;display:block;}
  .editor-sticky-head{position:sticky;top:-30px;z-index:5;margin:-30px -48px 0;padding:30px 48px 4px;background:var(--cream);}
  .editor-sticky-head .title-static,.editor-sticky-head .title-input{margin-bottom:16px;}
  .editor-sticky-head.has-shadow{box-shadow:0 8px 12px -10px rgba(30,58,42,.18);}
  @media (max-width: 860px){.editor-sticky-head{position:static;margin:0;padding:0;}}
  .toolbar{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;align-items:center;row-gap:6px;}
  .content-box hr{border:none;border-top:1px solid var(--border);margin:18px 0;}
  .content-box .block-label{color:var(--gold);}
  .content-box .field-tag{color:var(--gold);font-weight:600;}
  .tb-btn{width:30px;height:30px;border:1px solid var(--border);background:var(--card);border-radius:6px;cursor:pointer;color:var(--forest-deep);font-size:13px;font-weight:700;}
  .tb-btn:hover{background:var(--cream);border-color:var(--gold);}
  .tb-select{
    height:30px;border:1px solid var(--border);background:var(--card);border-radius:6px;
    color:var(--forest-deep);font-family:var(--font-body);font-size:12px;font-weight:600;
    padding:0 8px;cursor:pointer;margin-left:2px;
  }
  .tb-select:hover{border-color:var(--gold);}
  .content-box font[size="1"]{font-size:11px;}
  .content-box font[size="2"]{font-size:12.5px;}
  .content-box font[size="3"]{font-size:14.5px;}
  .content-box font[size="4"]{font-size:17px;}
  .content-box font[size="5"]{font-size:20px;}
  .content-box font[size="6"]{font-size:24px;}
  .content-box font[size="7"]{font-size:29px;}
  .content-box{min-height:280px;max-width:760px;border:1px solid var(--border);border-radius:10px;background:var(--card);padding:20px 22px;font-size:14.5px;line-height:1.45;outline:none;color:var(--ink);}
  .content-box:focus{border-color:var(--gold);}
  .content-box.static{background:transparent;border-color:transparent;padding:0;}
  .content-box ul{padding-left:20px;}
  .content-box p{margin:0;}
  .content-box p + p{margin-top:4px;}
  .content-box p:last-child{margin-bottom:0;}
  .content-box p:empty{margin:0;min-height:1px;}
  .content-box div{margin:0;}
  .content-box br{line-height:1.1;}
  .editor-footer{display:flex;justify-content:space-between;align-items:center;margin-top:20px;max-width:760px;}
  .save-hint{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .save-dot{width:6px;height:6px;border-radius:50%;background:#5a9c73;}

  #print-area{display:none;}
  @media print{
    body *{visibility:hidden;}
    #print-area, #print-area *{visibility:visible;}
    #print-area{display:block;position:absolute;top:0;left:0;width:100%;padding:20px 40px;}
    .print-section{margin-bottom:26px;page-break-inside:avoid;}
    .print-section h2{font-family:'Cormorant Garamond',serif;color:#2c4f3a;border-bottom:2px solid #b89a5e;padding-bottom:4px;}
    .print-page{margin:12px 0 14px;}
    .print-page .pnum{font-family:'Cormorant Garamond',serif;font-style:italic;color:#b89a5e;margin-right:6px;}
    .print-page h3{display:inline;font-size:15px;margin:0;}
    .print-page .body{font-size:12.5px;line-height:1.5;margin-top:4px;color:#282a24;}
    .print-page .body p{margin:0 0 4px;}
    .print-page .body font[size="1"]{font-size:9px;}
    .print-page .body font[size="2"]{font-size:10.5px;}
    .print-page .body font[size="3"]{font-size:12.5px;}
    .print-page .body font[size="4"]{font-size:14px;}
    .print-page .body font[size="5"]{font-size:16px;}
    .print-page .body font[size="6"]{font-size:19px;}
    .print-page .body font[size="7"]{font-size:23px;}
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <span class="mark"></span>
    <div>
      <h1>Catálogo de FAQ</h1>
      <div><span>Atendimento · Tania Bulhões</span></div>
    </div>
  </div>

  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="searchInput" type="text" placeholder="Buscar por título, conteúdo ou tag...">
    <div id="searchResults" class="search-results"></div>
  </div>

  <div class="actions">
    <span id="saveStatus" style="font-size:11px;color:rgba(244,239,226,.65);align-self:center;margin-right:4px;"></span>
    <button class="admin-btn" id="adminToggleBtn" onclick="toggleAdmin()">Entrar como admin</button>
    <button class="btn" onclick="printCatalog()">Imprimir catálogo</button>
    <button class="btn" id="importBtn" onclick="document.getElementById('importFile').click()">Importar JSON</button>
    <input type="file" id="importFile" accept="application/json">
    <button class="btn primary" onclick="exportJSON()">Exportar JSON</button>
    <button class="btn" id="githubConfigBtn" style="display:none;" onclick="openGithubConfig()">⚙️ GitHub</button>
    <button class="btn primary" id="githubPublishBtn" style="display:none;" onclick="publishToGithub()">🌐 Publicar</button>
  </div>
</div>

<div class="layout">
  <div class="col-tree">
    <div id="readonlyBanner" class="readonly-banner" style="display:none;">Somente leitura — entre como admin para editar</div>
    <div class="col-label">Seções &amp; Temas</div>
    <div id="treeList"></div>
    <button class="add-section-btn" id="addSectionBtn" onclick="addSection()">+ Nova seção</button>
  </div>

  <div class="col-editor" id="editorCol">
    <div class="editor-empty">
      <div class="big-num">§</div>
      <div>Selecione um tema à esquerda<br>para ver o conteúdo aqui.</div>
    </div>
  </div>
</div>

<div id="print-area"></div>

<div id="githubModalOverlay" class="gh-modal-overlay" onclick="if(event.target===this) closeGithubConfig()">
  <div class="gh-modal">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
      <h3 style="margin:0;">Configuração do GitHub</h3>
      <button onclick="closeGithubConfig()" title="Fechar" style="border:none;background:transparent;font-size:20px;line-height:1;cursor:pointer;color:var(--muted);padding:4px;">✕</button>
    </div>
    <div class="gh-field">
      <label>Token de Acesso Pessoal</label>
      <input class="gh-input" id="ghToken" type="password" placeholder="ghp_xxxxxxxxxxxx">
    </div>
    <div class="gh-field">
      <label>Usuário / Organização</label>
      <input class="gh-input" id="ghOwner" placeholder="ex: sihnunes">
    </div>
    <div class="gh-field">
      <label>Repositório</label>
      <input class="gh-input" id="ghRepo" placeholder="ex: faq-catalogo">
    </div>
    <div class="gh-field">
      <label>Caminho do arquivo</label>
      <input class="gh-input" id="ghPath" placeholder="ex: base-de-conhecimento-faq.html">
    </div>
    <div class="gh-field">
      <label>Branch</label>
      <input class="gh-input" id="ghBranch" placeholder="main" value="main">
    </div>
    <div class="gh-status" id="ghStatus"></div>
    <div class="gh-modal-actions">
      <button class="btn" onclick="testGithubConnection()">🔍 Testar</button>
      <button class="btn primary" onclick="saveGithubConfig()">✅ Salvar e fechar</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
/* ---------------- Data ---------------- */
const STORAGE_KEY = 'tb-faq-catalogo-v1';

const seedState = {
  "sections": [
    {
      "id": "s1",
      "name": "Manual de Atendimento",
      "color": "#d97757",
      "expanded": true,
      "pages": [
        {
          "id": "p1",
          "title": "Tom de Voz e Diretrizes Gerais",
          "tags": [
            "tom de voz"
          ],
          "content": "<h1><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"7\">Guia de Boas Práticas de Atendimento</font></h1><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">O atendimento é uma das formas mais importantes de traduzir o universo Tania Bulhões. Cada conversa representa uma oportunidade de acolher, orientar e criar uma experiência que reflita o cuidado, a sensibilidade e o savoir faire presentes em nossa marca.</font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Mais do que responder solicitações, buscamos construir conexões verdadeiras, oferecendo um atendimento que une eficiência, atenção aos detalhes e genuíno interesse pelo cliente.</font></p><div contenteditable=\"false\"><hr></div><h2><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">&nbsp;Nossa forma de comunicar&nbsp;</font></h2><h3><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Fale sempre em nome da marca</font></h3><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Somos uma única voz. Por isso, utilizamos sempre a primeira pessoa do plural.</font></p><p class=\"isSelectedEnd\"><strong><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Exemplos</font></strong></p><ul data-spread=\"false\"><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Verificamos que...</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Ficamos felizes em ajudar.</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Estamos à disposição.</font></li></ul><h3><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Escreva com delicadeza e naturalidade</font></h3><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Nossa comunicação deve ser próxima, elegante e acolhedora.</font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Em cada resposta:</font></p><ul data-spread=\"false\"><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">demonstre empatia;</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">respeite o momento do cliente;</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">mantenha uma linguagem simples, clara e gentil;</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">adapte a comunicação sem perder a identidade da marca.</font></li></ul><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Buscamos transmitir segurança sem soar mecânicas e proximidade sem perder a sofisticação.</font></p><h3><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Escute antes de responder</font></h3><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Todo atendimento começa pela compreensão.</font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Leia a mensagem com atenção, identifique a necessidade real do cliente e somente depois construa a resposta. Muitas vezes, o que o cliente precisa vai além da dúvida apresentada.</font></p><h3><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Cuide da escrita</font></h3><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">A forma como escrevemos também comunica qualidade.</font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Antes de enviar uma mensagem, revise:</font></p><ul data-spread=\"false\"><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">ortografia;</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">acentuação;</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">concordância;</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">clareza da informação.</font></li></ul><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Uma mensagem bem escrita transmite confiança e cuidado.</font></p><h3><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Emojis com equilíbrio</font></h3><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Os emojis podem tornar a conversa mais leve, desde que utilizados com intenção e moderação.</font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Prefira utilizá los apenas quando contribuírem para a proximidade da conversa, sem comprometer a elegância da comunicação.</font></p><h3><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Nunca deixe o cliente sem retorno</font></h3><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Mesmo quando ainda não houver uma solução definitiva, mantenha o cliente informado.</font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Sempre que necessário, sinalize que a solicitação está em andamento e informe quando ele poderá esperar uma nova atualização.</font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">A presença gera confiança.</font></p><h3><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Preserve a identidade da marca</font></h3><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Sempre que surgir alguma dúvida sobre linguagem, escolha a opção mais simples, elegante e acolhedora.</font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">O Brandbook deve ser a principal referência para garantir consistência em toda comunicação.</font></p><div contenteditable=\"false\"><hr></div><h2><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Organização do atendimento</font></h2><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Uma experiência de excelência também depende de organização.</font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Por isso:</font></p><ul data-spread=\"false\"><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">atenda os tickets seguindo a ordem de recebimento, priorizando os mais antigos;</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">acompanhe diariamente as pendências;</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">registre corretamente todas as informações relevantes;</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">cumpra os prazos e retornos assumidos com o cliente.</font></li></ul><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Cada compromisso cumprido fortalece a confiança na marca.</font></p><div contenteditable=\"false\"><hr></div><h2><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Trabalho em equipe</font></h2><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Encantar o cliente é uma responsabilidade compartilhada.</font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Mantenha uma comunicação próxima e colaborativa com as demais áreas, especialmente quando houver dependência de outras equipes para a conclusão do atendimento.</font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Acompanhe diariamente as comunicações da Logística e dos demais times envolvidos na jornada do cliente.</font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Compartilhar informações de forma clara e no momento certo torna a experiência mais fluida para todos.</font></p><div contenteditable=\"false\"><hr></div><h2><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Conhecimento que gera confiança</font></h2><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Conhecer profundamente a marca é parte essencial de um atendimento memorável.</font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Sempre que houver disponibilidade entre os atendimentos:</font></p><ul data-spread=\"false\"><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">navegue pelo site;</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">conheça produtos e coleções;</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">acompanhe lançamentos;</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">explore histórias, inspirações e diferenciais da marca;</font></li><li><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">consulte os materiais internos.</font></li></ul><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Quanto maior o conhecimento, mais natural será a capacidade de orientar, inspirar e oferecer uma experiência que represente o universo Tania Bulhões.</font></p><p><br></p>"
        }
      ]

          "content": "<p><font size=\"2\">&nbsp;<span data-contrast=\"none\" class=\"TextRun SCXO40349712 BCX0\" xml:lang=\"PT-BR\" lang=\"PT-BR\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; background-color: transparent; color: rgb(42, 42, 42); line-height: 18.4px; font-variant-ligatures: none !important;\">Olá, </span><span data-contrast=\"none\" class=\"TextRun SCXO40349712 BCX0\" xml:lang=\"PT-BR\" lang=\"PT-BR\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; background-color: transparent; color: rgb(122, 96, 48); line-height: 14.95px; font-variant-ligatures: none !important;\">[Nome]</span><span class=\"LineBreakBlob BlobObject DragDrop SCXO40349712 BCX0\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; line-height: 14.95px;\"><span class=\"SCXO40349712 BCX0\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent;\"><font color=\"#7a6030\"><span style=\"white-space: pre !important;\">&nbsp;!</span></font></span></span></font></p><p><font size=\"2\"><span data-contrast=\"none\" class=\"TextRun SCXO40349712 BCX0\" xml:lang=\"PT-BR\" lang=\"PT-BR\" style=\"background-color: transparent; margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; line-height: 18.4px;\"><font color=\"#7a6030\"><span style=\"white-space: pre;\"><br></span></font><font color=\"#2a2a2a\"><span style=\"font-variant-ligatures: none !important;\">Antes de tudo, queremos pedir desculpas pelo transtorno e atraso no envio do seu pedido.&nbsp;</span></font></span><span class=\"LineBreakBlob BlobObject DragDrop SCXO40349712 BCX0\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; line-he ser-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; white-space: pre !important;\">&nbsp;</span><br class=\"SCXO40349712 BCX0\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; white-space: pre !important;\"></span><span data-contrast=\"none\" class=\"TextRun SCXO40349712 BCX0\" xml:lang=\"PT-BR\" lang=\"PT-BR\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; background-color: transparent; color: rgb(42, 42, 42); line-height: 18.4px; font-variant-ligatures: none !important;\"><br>Estamos cuidando para que seu produto chegue até você o mais breve possível.</span><span class=\"LineBreakBlob BlobObject DragDrop SCXO40349712 BCX0\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; line-height: 18.4px; color: rgb(42, 42, 42);\"><span class=\"SCXO40349712 BCX0\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; white-space: pre !important;\">&nbsp;</span><br class=\"SCXO40349712 BCX0\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; white-space: pre !important;\"></span><span data-contrast=\"none\" class=\"TextRun SCXO40349712 BCX0\" xml:lang=\"PT-BR\" lang=\"PT-BR\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; background-color: transparent; color: rgb(42, 42, 42); line-height: 18.4px; font-variant-ligatures: none !important;\"><br>Se precisar de qualquer apoio durante esse processo, estamos à disposição.</span><span class=\"EOP SCXO40349712 BCX0\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; line-height: 18.4px; color: rgb(42, 42, 42);\         {
          "id": "idov0vp9ue",
          "title": "Chargeback",
          "tags": [],
          "content": "<p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Olá,&nbsp;<span class=\"field-tag\">[nome]</span>&nbsp;!&nbsp;&nbsp;Tudo bem?<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Recebemos uma notificação informando que o pagamento do seu pedido&nbsp;<span class=\"field-tag\">[n° pedido]</span>&nbsp;&nbsp;entregue em&nbsp;<span class=\"field-tag\">[data]</span>&nbsp;, foi contestado junto à administradora do cartão.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Gostaríamos de entender o que aconteceu para que possamos encontrar a melhor solução. Caso a contestação tenha sido realizada por engano, podemos solicitar um novo link para pagamento. Se preferir, também podemos orientar sobre o processo de devolução dos produtos.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Ficamos no aguardo do seu retorno e permanecemos à disposição para ajudá-la no que for necessário.</font></p>"
        },
        {
          "id": "idqe6iqqol",
          "title": "Cheiro da Embalagem",
          "tags": [],
          "content": "<p class=\"isSelectedEnd\"><font size=\"2\">É a nossa fragrância Chá Branco<br><br>A fragrância <strong>Chá Branco</strong> é um dos grandes clássicos da perfumaria Tania Bulhões.<br><br></font></p><p class=\"isSelectedEnd\"><font size=\"2\">Sua composição combina a leveza do chá branco, o frescor das notas cítricas e a sofisticação das especiarias, criando uma fragrância delicada que envolve os ambientes e convida a viver momentos de calma e bem-estar.<br><br></font></p><p class=\"isSelectedEnd\"><font size=\"2\">A coleção reúne produtos para perfumar a casa e também perfumaria pessoal, levando essa experiência para diferentes momentos do dia.<br><br></font></p><p><font size=\"2\">Descubra a coleção completa em:&nbsp;<a href=\"https://www.taniabulhoes.com.br/search?query=ch%C3%A1+branco\">https://www.taniabulhoes.com.br/search?query=ch%C3%A1+branco</a>&nbsp;</font></p>"
        },
        {
          "id": "id8yrogdwy",
          "title": "Fornecedores",
          "tags": [],
          "content": "<p class=\"isSelectedEnd\"><font size=\"2\">Ficamos muito felizes em saber que a Tania Bulhões inspira você.&nbsp;<br><br></font></p><p class=\"isSelectedEnd\"><font size=\"2\">Em relação aos nossos fornecedores, essas informações fazem parte de processos internos e, por isso, são confidenciais.</font></p><p><font size=\"2\"><br>Agradecemos pela compreensão e permanecemos à disposição caso possamos ajudar com qualquer outra dúvida.</font></p>"
        },
        {
          "id": "idjt0ssps9",
          "title": "Golpe Transportadora  ",
          "tags": [],
          "content": "<p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Sentimos muito por essa situação.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Gostaríamos de reforçar que nossas transportadoras não realizam qualquer tipo de cobrança e não entram em contato diretamente com nossos clientes. Todas as comunicações relacionadas ao seu pedido são feitas exclusivamente por meio dos nossos canais oficiais de atendimento.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Se houver qualquer atualização, informação ou valor a ser comunicado, nossa equipe entrará em contato diretamente com você.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Caso receba mensagens com links, solicitações de pagamento ou qualquer informação que gere dúvida, orientamos que não realize nenhuma ação antes de falar conosco. Teremos o maior prazer em verificar a situação e orientá-la da melhor forma.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Permanecemos à disposição sempre que precisar.</font></p>"
        },
        {
          "id": "idqn5pk5qe",
          "title": "LGPD - Exclusão de dados ",
          "tags": [],
          "content": "<p class=\"isSelectedEnd\"><font size=\"2\">Compreendemos a sua solicitação e agradecemos por entrar em contato.<br><br></font></p><p class=\"isSelectedEnd\"><font size=\"2\">No momento, não é possível realizar a exclusão dos seus dados pessoais, pois temos uma obrigação legal que determina a manutenção dessas informações por um período específico.<br><br></font></p><p class=\"isSelectedEnd\"><font size=\"2\">Conforme o artigo 173 do Código Tributário Nacional, precisamos manter os dados relacionados às Notas Fiscais por, no mínimo, cinco anos. Sempre que uma nova compra é realizada em nosso site ou em uma de nossas lojas, esse prazo passa a ser contado novamente a partir da emissão da nova Nota Fiscal.<br><br></font></p><p class=\"isSelectedEnd\"><font size=\"2\">Assim que esse período legal for encerrado e não houver outra obrigação de retenção, seus dados poderão ser excluídos mediante nova solicitação.<br><br></font></p><p><font size=\"2\">Caso tenha qualquer dúvida ou precise de mais informações, ficaremos felizes em ajudar.</font></p>"
        },
        {
          "id": "idwvhk23by",
          "title": " Reciclagem Vidro ",
          "tags": [],
          "content": "<p class=\"isSelectedEnd\"><font size=\"2\">Agradecemos por compartilhar sua sugestão conosco.<br><br></font></p><p><font size=\"2\">Na Tania Bulhões, acreditamos que ouvir nossos clientes é parte essencial da construção da nossa marca. Por isso, seu feedback é muito importante para nós.<br><br>Temos um compromisso constante com práticas mais responsáveis e seguimos avaliando alternativas para ampliar nossas iniciativas voltadas à sustentabilidade.<br><br>No momento, orientamos que as embalagens de vidro sejam encaminhadas aos pontos de coleta seletiva, pois esse material é 100% reciclável e pode ser reaproveitado diversas vezes sem perda de qualidade.<br><br>Agradecemos por contribuir com essa conversa e por fazer parte dessa construção junto com a nossa marca.</font></p>"
        },

 o desconforto que essa situação possa ter causado.&nbsp;</span><span class=\"EOP SCXO51058592 BCX0\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; line-height: 20.7px;\">&nbsp;<br><br></span>Nossa equipe já está dedicada à análise dessa instabilidade para normalizar o funcionamento o quanto antes.<br><br><span data-contrast=\"none\" class=\"TextRun SCXO149990920 BCX0\" xml:lang=\"PT-BR\" lang=\"PT-BR\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; line-height: 20.7px; font-variant-ligatures: none !important;\">Enquanto isso, se desejar, uma de nossas consultoras digitais poderá entrar em contato com você através do WhatsApp para te auxiliar a finalizar o seu pedido.</span></font><span data-contrast=\"none\" class=\"TextRun SCXO149990920 BCX0\" xml:lang=\"PT-BR\" lang=\"PT-BR\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 11pt; font-family: &quot;Calibri Light&quot;, sans-serif; line-height: 20.7px; font-variant-ligatures: none !important;\">&nbsp;</span><span class=\"EOP SCXO149990920 BCX0\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; font-size: 11pt; line-height: 20.7px; font-family: &quot;Calibri Light&quot;, sans-serif;\">&nbsp;</span><font face=\"Calibri, Candara, Segoe UI, sans-serif\" style=\"\" size=\"3\"><span class=\"EOP SCXO51058592 BCX0\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; line-height: 20.7px;\"></span></font></p></div>"

        {
          "id": "idmwfmw6mi",
          "title": "Autorização de Postagem",
          "tags": [],
          "content": "<p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Olá,&nbsp;<span class=\"field-tag\">[nome]!&nbsp;</span>&nbsp;Tudo bem?<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Geramos uma autorização de postagem para que você possa realizar a devolução dos produtos sem qualquer custo.<br><br>Você poderá fazer a postagem em qualquer agência dos Correios utilizando o código&nbsp;<span class=\"field-tag\">[código de postagem]</span>&nbsp;, válido até o dia&nbsp;<span class=\"field-tag\">[data].</span>&nbsp;Após essa data, o código será expirado e não será mais possível utilizá-lo.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Antes de realizar a postagem, pedimos que os produtos estejam devidamente embalados, para que cheguem em perfeitas condições e sem avarias durante o transporte.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Assim que a devolução for recebida em nosso centro de distribuição, entraremos em contato para dar continuidade ao atendimento.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Se precisar de qualquer ajuda, estamos à disposição.</font></p>"
        },
        {
          "id": "id3orz6a07",
          "title": "Coleta Domiciliar",
          "tags": [],
          "content": "<p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Olá,&nbsp;<span class=\"field-tag\">[nome]</span>&nbsp;! Tudo bem?<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Para sua maior comodidade, agendamos uma coleta domiciliar para que a devolução dos produtos seja realizada de forma prática e segura.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">A primeira tentativa de coleta está prevista para o dia&nbsp;<span class=\"field-tag\">[data]</span>&nbsp;, em horário comercial, no endereço informado.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Antes da coleta, pedimos que o produto esteja devidamente embalado para garantir um transporte seguro. Se o seu endereço possuir portaria, orientamos que o volume esteja disponível nesse local para facilitar a retirada.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Assim que a devolução for recebida em nosso centro de distribuição, entraremos em contato para dar continuidade ao atendimento.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Se tiver qualquer dúvida, estaremos à disposição para ajudar.</font></p>"
        },
        {
          "id": "id83qa2rf8",
          "title": "Comprovante Estorno ",
          "tags": [],
          "content": "<p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\"><span data-contrast=\"none\" class=\"TextRun  BCX0 SCXO10874859\" xml:lang=\"PT-BR\" lang=\"PT-BR\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; color: rgb(73, 80, 87); line-height: 24.15px; font-variant-ligatures: none !important;\">Olá,&nbsp;</span><span class=\"field-tag\">[nome]</span>&nbsp;! T<span data-contrast=\"none\" class=\"TextRun  BCX0 SCXO10874859\" xml:lang=\"PT-BR\" lang=\"PT-BR\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; color: rgb(73, 80, 87); line-height: 24.15px; font-variant-ligatures: none !important;\">udo bem?&nbsp;</span><span class=\"LineBreakBlob BlobObject DragDrop  BCX0 SCXO10874859\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; line-height: 24.15px; color: rgb(73, 80, 87);\"><span class=\"BCX0 SCXO10874859\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; white-space: pre !important;\">&nbsp;</span><br class=\"BCX0 SCXO10874859\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; white-space: pre !important;\"></span><span data-contrast=\"none\" class=\"TextRun EmptyTextRun  BCX0 SCXO10874859\" xml:lang=\"PT-BR\" lang=\"PT-BR\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; color: rgb(73, 80, 87); line-height: 24.15px; font-variant-ligatures: none !important;\"></span><span class=\"LineBreakBlob BlobObject DragDrop  BCX0 SCXO10874859\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; line-height: 24.15px; color: rgb(73, 80, 87);\"><span class=\"BCX0 SCXO10874859\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; white-space: pre !important;\">&nbsp;</span><br class=\"BCX0 SCXO10874859\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; white-space: pre !important;\"></span><span data-contrast=\"none\" class=\"TextRun  BCX0 SCXO10874859\" xml:lang=\"PT-BR\" lang=\"PT-BR\" style=\"margin: 0px; padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; color: rgb(73, 80, 87); line-height: 24.15px; font-variant-ligatures: none !important;\">O estorno referente ao seu pedido foi concluído com sucesso e realizado conforme o meio de pagamento utilizado.</span><br><br>Se a compra foi realizada por cartão de crédito, o valor poderá ser visualizado em até duas faturas subsequentes, de acordo com os prazos da administradora do cartão. Caso a fatura atual já esteja fechada, o crédito será lançado automaticamente na próxima.<br><br></font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Se a compra foi realizada via Pix, o valor será devolvido para a mesma conta utilizada no pagamento.</font></p><p></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\"><br>Caso tenha qualquer dúvida, permanecemos à disposição para ajudar!</font></p>"
        },
        {
          "id": "id578y8789",
          "title": "Troca (Crédito)",
          "tags": [],
          "content": "<p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Olá,&nbsp;<span class=\"field-tag\">[nome],&nbsp;</span>boa tarde! Tudo bem?<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Recebemos a devolução do produto&nbsp;<span class=\"field-tag\">[nome do produto]</span>&nbsp;&nbsp;e o crédito no valor de&nbsp;<span class=\"field-tag\">[R$]</span>&nbsp;&nbsp;já está disponível em seu CPF.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Você poderá utilizá-lo em qualquer uma de nossas lojas físicas ou, se preferir, contar com o suporte de uma de nossas consultoras pelo WhatsApp.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Caso tenha qualquer dúvida, estaremos à disposição para ajudar.&nbsp;</font></p>"
        },
        {
          "id": "idp0636fop",
          "title": "Trocas sem identificação da compra",
          "tags": [],
          "content": "<p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">O processo de troca ou devolução pode ser realizado mediante a apresentação do cupom fiscal, da Nota Fiscal ou de outro comprovante que permita identificar a compra.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Essa etapa é importante para confirmar as informações do pedido, validar os prazos e as condições da compra, garantindo que todo o processo seja realizado de forma segura, transparente e em conformidade com nossas políticas.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Se você tiver o cupom fiscal, a Nota Fiscal ou qualquer outra informação da compra, como o CPF ou o e-mail utilizado no pedido, poderemos localizar o registro da compra. Em algumas situações, também é possível identificar a compra por meio do nome completo da pessoa que presenteou você.</font></p>"
        }
      ]

        {
          "id": "idvfg60u56",
          "title": "Amostras",
          "tags": [],
          "content": "<p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Poxa, no momento não realizamos o envio de amostras.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Mas será um prazer acompanhar você nessa descoberta. Temos lojas e parceiros em todo o Brasil, onde você poderá conhecer nossas fragrâncias e encontrar aquela que mais combina com o seu estilo.</font><br><br><br></p>"
        },
        {
          "id": "id3v21pjmf",
          "title": "Compartilháveis",
          "tags": [],
          "content": "<div class=\"OutlineElement Ltr  BCX0 SCXO130050667\" style=\"padding: 0px; user-select: text; -webkit-user-drag: none; -webkit-tap-highlight-color: transparent; overflow: visible; cursor: text; clear: both; position: relative; direction: ltr; color: rgb(0, 0, 0);\"><p data-pm-slice=\"1 1 []\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Oii, XX, bom dia! Tudo bem? \n<br><br></font></p><p>\n</p><p>  \n</p><p>\n</p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Nossos perfumes foram desenvolvidos para serem usados por qualquer pessoa, independentemente de sua identidade de gênero. \n<br><br></font></p><p>\n</p><p>  \n</p><p>\n</p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Se desejar, teremos o maior prazer em indicar algumas fragrâncias de acordo com as suas preferências olfativas e ajudá-lo(a) a encontrar aquela que mais combina com o seu estilo.</font></p></div>"
        },
        {
          "id": "id2f61t1qi",
          "title": "Fixação",
          "tags": [],
          "content": "<p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\">Você sabia que nossos perfumes possuem a classificação <strong>Eau de Parfum</strong>?&nbsp; Desenvolvidos com uma alta concentração de ingredientes da alta perfumaria, eles oferecem uma fragrância intensa, envolvente e duradoura. Sua fixação mínima de 8 horas foi comprovada por rigorosos testes de longa duração realizados por um instituto renomado no Brasil.<br><br></font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\">É importante considerar que a experiência com uma fragrância é única para cada pessoa. Fatores como o tipo de pele, o nível de hidratação, a temperatura corporal e até mesmo as características da própria fragrância podem influenciar sua evolução e permanência ao longo do dia. Se você prefere uma presença ainda mais marcante, a reaplicação é sempre uma ótima opção.<br><br></font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\">Gostaríamos de compartilhar também algumas dicas para que você aproveite ao máximo a sua fragrância. Manter a pele bem hidratada e aplicar o perfume em pontos de maior circulação sanguínea, como pulsos, pescoço, colo e atrás das orelhas, ajuda a prolongar sua duração na pele.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\">Esperamos que essas dicas ajudem você a aproveitar ainda mais a sua fragrância.<br><br>Se precisar de qualquer ajuda, será um prazer atender você! 💚</font></p>"
        },
        {
          "id": "id6xsx3p59",
          "title": "História",
          "tags": [],
          "content": "<p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Nossa linha de Perfumaria Pessoal nasceu do desejo de Tania Bulhões de transformar memórias, emoções e experiências em fragrâncias capazes de despertar os sentidos e criar novas lembranças.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Nossa coleção reúne diferentes famílias olfativas, com opções que vão das fragrâncias mais frescas e delicadas às mais intensas e marcantes, para acompanhar diferentes momentos e estilos.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Convidamos você a explorar esse universo e descobrir a fragrância que mais combina com você.</font></p>"
        },
        {
          "id": "idunig2vi7",
          "title": "Inspirações & Importados",
          "tags": [],
          "content": "<p><strong class=\"block-label\" style=\"color: rgb(184, 154, 94);\">Opção 1:<br></strong><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Nossas fragrâncias são autorais e não são desenvolvidas com inspiração em outras marcas.\n<br><br>Se desejar, podemos ajudar você a encontrar uma fragrância que mais combinam com você.\n<br><br>&nbsp;Você prefere fragrâncias florais, frutadas, cítricas, amadeiradas ou intensas?&nbsp;</font></p><hr><p><strong class=\"block-label\">Opção 2:</strong></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Você sabia que nossos perfumes são criados em parceria entre Tania Bulhões e alguns dos mais renomados perfumistas de Grasse, berço da alta perfumaria mundial, em uma das casas de fragrâncias mais prestigiadas do mundo?<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Cada criação reúne uma seleção criteriosa de óleos essenciais e matérias-primas de alta qualidade, escolhidas para revelar fragrâncias sofisticadas, marcantes e cheias de personalidade.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Muitos desses ingredientes são cultivados e colhidos manualmente por pequenos produtores em diferentes regiões do mundo, preservando sua autenticidade presente em cada etapa desse processo.&nbsp;<span data-contrast=\"auto\" class=\"TextRun SCXO50943828 BCX0\" xml:lang=\"PT-PT\" lang=\"PT-PT\" style=\"accent-color: auto; place-content: normal; place-items: normal; place-self: auto; alignment-baseline: auto; anchor-name: none; anchor-scope: none; animation: 0s ease 0s 1 normal none running none; animation-composition: replace; animation-trigger: none; app-region: none; appearance: none; aspect-ratio: auto; backdrop-filter: none; backface-visibility: visible; background: none 0% 0% / auto repeat scroll padding-box border-box rgba(0, 0, 0, 0); background-blend-mode: normal; baseline-shift: 0px; baseline-source: auto;           "title": "Novas Embalagens",
          "tags": [],
          "content": "<p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Oii! Temos uma novidade para compartilhar com você.<br><br></font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Nossa linha de perfumes está de cara nova! Agora, todas as fragrâncias possuem a classificação <strong>Eau de Parfum</strong>, proporcionando uma experiência olfativa ainda mais intensa, envolvente e duradoura.<br><br></font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Além da nova concentração, os perfumes ganharam embalagens mais sofisticadas e nomes que homenageiam as paixões e memórias que inspiram o universo de Tania Bulhões.<br><br></font></p><p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">A fragrância anteriormente conhecida como <strong>Tania Nº 30</strong> agora passa a se chamar <strong>1989</strong>, preservando sua identidade olfativa com uma nova forma de contar essa história.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Convidamos você a conhecer a nova Perfumaria Tania Bulhões e se encantar com cada criação: <a href=\"https://www.taniabulhoes.com.br/perfumes\" style=\"\">https://www.taniabulhoes.com.br/perfumes</a> 💚</font></p>"
        },
        {
          "id": "idyj36vibi",
          "title": "Veganos",
          "tags": [],
          "content": "<p class=\"isSelectedEnd\"><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Nossos produtos não são testados em animais e não possuem ingredientes de origem animal em suas formulações.<br><br></font></p><p><font face=\"Calibri, Candara, Segoe UI, sans-serif\" size=\"3\">Além disso, nossos perfumes possuem o selo PETA, uma das certificações mais reconhecidas mundialmente para produtos <strong>cruelty-free</strong>, que atesta o compromisso da marca com práticas livres de crueldade animal.</font></p>"
        }

const ADMIN_PASSWORD = 'tb2026';

function toggleAdmin(){
  if(isAdmin){
    isAdmin = false;
    updateAdminUI();
    renderAll();
    return;
  }
  const pass = prompt('Senha de administrador:');
  if(pass === null) return;
  if(pass === ADMIN_PASSWORD){
    isAdmin = true;
  } else {
    alert('Senha incorreta.');
  }
  updateAdminUI();
  renderAll();
}
function updateAdminUI(){
  const btn = document.getElementById('adminToggleBtn');
  const banner = document.getElementById('readonlyBanner');
  const importBtn = document.getElementById('importBtn');
  btn.textContent = isAdmin ? 'Sair do modo admin' : 'Entrar como admin';

function findSection(id){ return state.sections.find(s=>s.id===id); }

  for(const s of state.sections){

}

}

      if(s.pages.length === 0){
        const hint = document.createElement('div');
        hint.className = 'empty-hint-inline';
        hint.textContent = 'Nenhum tema nesta seção ainda.';
        pagesBox.appendChild(hint);
      }

      s.pages.forEach((p, pIdx) => {
        const row = document.createElement('div');
        row.className = 'tree-page-row' + (p.id===selectedPageId ? ' active':'');
        row.innerHTML = `
          <span class="num">${sIdx+1}.${pIdx+1}</span>
          <span class="title" id="pageTitle-${p.id}">${escapeHtml(p.title)}</span>
          ${isAdmin ? `
          <div class="page-controls">
            <button class="icon-btn" title="Mover para cima" data-action="up">↑</button>
            <button class="icon-btn" title="Mover para baixo" data-action="down">↓</button>
            <button class="icon-btn" title="Excluir tema" data-action="del">✕</button>
          </div>` : ''}
        `;
        if(isAdmin){
          row.querySelector('[data-action="up"]').addEventListener('click', e => { e.stopPropagation(); movePage(s.id,p.id,-1); });
          row.querySelector('[data-action="down"]').addEventListener('click', e => { e.stopPropagation(); movePage(s.id,p.id,1); });
          row.querySelector('[data-action="del"]').addEventListener('click', e => { e.stopPropagation(); deletePage(s.id,p.id); });
        }
        row.addEventListener('click', () => selectPage(s.id, p.id));
        pagesBox.appendChild(row);
      });

      if(isAdmin){
        const addBtn = document.createElement('button');
        addBtn.className = 'add-page-btn-inline';
        addBtn.textContent = '+ Novo tema';
        addBtn.addEventListener('click', e => { e.stopPropagation(); addPage(s.id); });
        pagesBox.appendChild(addBtn);
      }

      wrap.appendChild(pagesBox);
    }

    list.appendChild(wrap);
  });
}

/* ---------------- Render: right panel (content) ---------------- */
function renderEditor(){
  const col = document.getElementById('editorCol');
  const found = selectedPageId ? findPageAnywhere(selectedPageId) : null;

  if(!found){
    col.innerHTML = `<div class="editor-empty"><div class="big-num">§</div><div>Selecione um tema à esquerda<br>para ver o conteúdo aqui.</div></div>`;
    return;
  }
  const { section, page } = found;
  const sIdx = state.sections.findIndex(s=>s.id===section.id) + 1;
  const pIdx = section.pages.findIndex(p=>p.id===page.id) + 1;

  if(!isAdmin){
    col.innerHTML = `
      <div class="editor-sticky-head" id="stickyHead">
        <div class="editor-topline">
          <span class="catalog-num">${sIdx}.${pIdx}</span>
          <span class="section-name">${escapeHtml(section.name)}</span>
        </div>
        <div class="title-static">${escapeHtml(page.title)}</div>
      </div>
      <div class="content-box static">${page.content}</div>
    `;
    return;
  }

  col.innerHTML = `
    <div class="editor-sticky-head" id="stickyHead">
      <div class="editor-topline">
        <span class="catalog-num">${sIdx}.${pIdx}</span>
        <span class="section-name">${escapeHtml(section.name)}</span>
      </div>
      <input class="title-input" id="titleInput" value="${escapeHtml(page.title)}">

      <span class="field-label">Conteúdo</span>
      <div class="toolbar">
        <button class="tb-btn" onclick="format('bold')" title="Negrito"><b>N</b></button>
        <button class="tb-btn" onclick="format('italic')" title="Itálico"><i>I</i></button>
        <button class="tb-btn" onclick="format('insertUnorderedList')" title="Lista">≡</button>
        <select class="tb-select" id="fontFamilySelect" title="Fonte do texto" onchange="setFontFamily(this.value)">
          <option value="">Fonte</option>
          <option value="Calibri, Candara, Segoe UI, sans-serif">Calibri</option>
          <option value="Arial, Helvetica, sans-serif">Arial</option>
          <option value="Georgia, serif">Georgia</option>
          <option value="'Times New Roman', Times, serif">Times New Roman</option>
          <option value="Verdana, Geneva, sans-serif">Verdana</option>
          <option value="Tahoma, Geneva, sans-serif">Tahoma</option>
          <option value="'Courier New', Courier, monospace">Courier New</option>
          <option value="'Cormorant Garamond', serif">Cormorant Garamond</option>
          <option value="'DM Sans', sans-serif">DM Sans (padrão)</option>
        </select>
        <select class="tb-select" id="fontSizeSelect" title="Tamanho da fonte" onchange="setFontSize(this.value)">
          <option value="">Tamanho</option>
          <option value="2">Pequeno</option>
          <option value="3">Normal</option>
          <option value="4">Médio</option>
          <option value="5">Grande</option>
          <option value="6">Muito grande</option>
          <option value="7">Título</option>
        </select>
        <button class="tb-btn" style="width:auto;padding:0 12px;" onclick="insertFieldTag()" title="Inserir campo personalizado (ex: [Nome], [CPF])">[ ] Campo</button>
        <button class="tb-btn" style="width:auto;padding:0 12px;" onclick="addContentBlock()" title="Adicionar novo bloco de conteúdo (ex: Opção 2)">+ Bloco</button>
      </div>
    </div>

    <div class="content-box" id="contentBox" contenteditable="true">${page.content}</div>

    <div class="editor-footer">
      <span class="save-hint"><span class="save-dot"></span>Alterações salvas automaticamente</span>
      <button class="btn danger-text" onclick="deletePage('${section.id}','${page.id}')">Excluir tema</button>
    </div>
  `;

  document.getElementById('titleInput').addEventListener('input', (e) => {
    page.title = e.target.value;
    const rowTitle = document.getElementById('pageTitle-'+page.id);
    if(rowTitle) rowTitle.textContent = e.target.value || 'Sem título';
    persist();
  });
  document.getElementById('contentBox').addEventListener('focus', () => {

  });

    persist();
  });
}

function format(cmd){
  if(!isAdmin) return;
  document.execCommand(cmd, false, null);
  document.getElementById('contentBox').focus();
}
function setFontFamily(value){
  if(!isAdmin || !value) return;
  const box = document.getElementById('contentBox');
  box.focus();
  document.execCommand('fontName', false, value);
  document.getElementById('fontFamilySelect').value = '';
  box.dispatchEvent(new Event('input'));
}
function setFontSize(value){
  if(!isAdmin || !value) return;
  const box = document.getElementById('contentBox');
  box.focus();
  document.execCommand('fontSize', false, value);
  document.getElementById('fontSizeSelect').value = '';
  box.dispatchEvent(new Event('input'));
}
function addContentBlock(){
  if(!isAdmin) return;
  const box = document.getElementById('contentBox');
  box.focus();
  const existingCount = (box.innerHTML.match(/Opção\s?\d+/gi) || []).length;
  // se ainda não há nenhum bloco rotulado, o conteúdo atual já é a "Opção 1" implícita
  const nextNum = existingCount === 0 ? 2 : existingCount + 1;
  const html = `<hr><p><strong class="block-label">Opção ${nextNum}:</strong></p><p><br></p>`;
  const range = document.createRange();
  range.selectNodeContents(box);
  range.collapse(false);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  document.execCommand('insertHTML', false, html);
  box.dispatchEvent(new Event('input'));
}
function insertFieldTag(){
  if(!isAdmin) return;
  const box = document.getElementById('contentBox');
  // guarda a posição do cursor antes do prompt (que tira o foco do editor)
  const sel = window.getSelection();
  let savedRange = null;
  if(sel && sel.rangeCount > 0 && box.contains(sel.anchorNode)){
    savedRange = sel.getRangeAt(0).cloneRange();
  }
  const name = prompt('Nome do campo personalizado (ex: Nome, CPF, nº do pedido):');
  if(name === null) return;
  const trimmed = name.trim();
  if(!trimmed) return;
  box.focus();
  if(savedRange){
    sel.removeAllRanges();
    sel.addRange(savedRange);
  } else {
    const range = document.createRange();
    range.selectNodeContents(box);
    range.collapse(false);
    sel.removeAllRanges();
    sel.addRange(range);
  }
  document.execCommand('insertHTML', false, `<span class="field-tag">[${escapeHtml(trimmed)}]</span>&nbsp;`);
  box.dispatchEvent(new Event('input'));
}

/* ---------------- Actions ---------------- */
function toggleSectionExpand(id){
  const s = findSection(id);
  s.expanded = !s.expanded;
  renderAll();
}
function toggleColorPicker(id){
  if(!isAdmin) return;
  openColorPickerFor = (openColorPickerFor === id) ? null : id;
  renderTree();
}
function setSectionColor(id, color){
  if(!isAdmin) return;
  findSection(id).color = color;
  openColorPickerFor = null;
  renderAll();
}
function renameSection(id, value){
  if(!isAdmin) return;
  findSection(id).name = value.trim() || 'Sem título';
  renderAll();
}
function addSection(){
  if(!isAdmin) return;
  const s = { id:uid(), name:'Nova seção', color: palette[state.sections.length % palette.length], expanded:true, pages:[] };
  state.sections.push(s);
  renderAll();
}
function deleteSection(id){
  if(!isAdmin) return;
  if(!confirm('Excluir esta seção e todos os seus temas?')) return;
  state.sections = state.sections.filter(s=>s.id!==id);
  if(selectedSectionId===id){ selectedSectionId = null; selectedPageId = null; }
  renderAll();
}
function moveSection(id, dir){
  if(!isAdmin) return;
  const i = state.sections.findIndex(s=>s.id===id);
  const j = i+dir;
  if(j<0 || j>=state.sections.length) return;
  [state.sections[i], state.sections[j]] = [state.sections[j], state.sections[i]];
  renderAll();
}
function addPage(sectionId){
  if(!isAdmin) return;
  const s = findSection(sectionId);
  s.expanded = true;
  const p = { id:uid(), title:'Novo tema', tags:[], content:'<p>Escreva o conteúdo aqui...</p>' };
  s.pages.push(p);
  selectedSectionId = sectionId; selectedPageId = p.id;
  renderAll();
}
function deletePage(sectionId, pageId){
  if(!isAdmin) return;
  if(!confirm('Excluir este tema?')) return;
  const s = findSection(sectionId);
  s.pages = s.pages.filter(p=>p.id!==pageId);
  if(selectedPageId===pageId) selectedPageId = null;
  renderAll();
}
function movePage(sectionId, pageId, dir){
  if(!isAdmin) return;
  const s = findSection(sectionId);
  const i = s.pages.findIndex(p=>p.id===pageId);
  const j = i+dir;
  if(j<0 || j>=s.pages.length) return;
  [s.pages[i], s.pages[j]] = [s.pages[j], s.pages[i]];
  renderAll();
}
function selectPage(sectionId, pageId){
  const s = findSection(sectionId);
  s.expanded = true;
  selectedSectionId = sectionId; selectedPageId = pageId;
  renderAll();
}

/* ---------------- Search ---------------- */
document.getElementById('editorCol').addEventListener('scroll', (e) => {
  const head = document.getElementById('stickyHead');
  if(head) head.classList.toggle('has-shadow', e.target.scrollTop > 4);
});

document.getElementById('searchInput').addEventListener('input', (e) => {
  const q = e.target.value.trim().toLowerCase();
  const resultsBox = document.getElementById('searchResults');
  if(!q){ resultsBox.classList.remove('open'); return; }

  const results = [];
  state.sections.forEach((s, sIdx) => {
    s.pages.forEach((p, pIdx) => {
      const haystack = (p.title + ' ' + stripHtml(p.content) + ' ' + p.tags.join(' ')).toLowerCase();
      if(haystack.includes(q)){
        results.push({ sectionId:s.id, pageId:p.id, num:`${sIdx+1}.${pIdx+1}`, title:p.title, snippet: stripHtml(p.content).slice(0,80) });
      }
    });
  });

  resultsBox.innerHTML = results.length
    ? results.map(r => `
        <div class="search-result" data-section="${r.sectionId}" data-page="${r.pageId}">
          <div><span class="num">${r.num}</span><span class="title">${escapeHtml(r.title)}</span></div>
          <div class="snippet">${escapeHtml(r.snippet)}${r.snippet.length===80?'…':''}</div>
        </div>`).join('')
    : `<div class="search-empty">Nenhum resultado para "${escapeHtml(q)}"</div>`;
  resultsBox.classList.add('open');
  resultsBox.querySelectorAll('.search-result').forEach(el => {
    el.addEventListener('click', () => jumpToResult(el.dataset.section, el.dataset.page));
  });
});
function jumpToResult(sectionId, pageId){
  document.getElementById('searchResults').classList.remove('open');
  document.getElementById('searchInput').value = '';
  selectPage(sectionId, pageId);
}
document.addEventListener('click', (e) => {
  if(!e.target.closest('.search-wrap')) document.getElementById('searchResults').classList.remove('open');
});

/* ---------------- Publicação no GitHub ---------------- */
const GH_CONFIG_KEY = 'tb-faq-gh-config';

function toast(msg, ms){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => el.classList.remove('show'), ms || 4200);
}

function loadGithubConfig(){
  try{
    const raw = localStorage.getItem(GH_CONFIG_KEY);
    return raw ? JSON.parse(raw) : null;
  }catch(e){ return null; }
}
function saveGithubConfigObj(cfg){
  try{ localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(cfg)); }catch(e){}
}
function readGithubForm(){
  return {
    token: document.getElementById('ghToken').value.trim(),
    owner: document.getElementById('ghOwner').value.trim(),
    repo: document.getElementById('ghRepo').value.trim(),
    path: document.getElementById('ghPath').value.trim().replace(/^\/+/,''),
    branch: (document.getElementById('ghBranch').value.trim() || 'main')
  };
}
function openGithubConfig(){
  if(!isAdmin) return;
  const cfg = loadGithubConfig() || {};
  document.getElementById('ghToken').value = cfg.token || '';
  document.getElementById('ghOwner').value = cfg.owner || '';
  document.getElementById('ghRepo').value = cfg.repo || '';
  document.getElementById('ghPath').value = cfg.path || '';
  document.getElementById('ghBranch').value = cfg.branch || 'main';
  document.getElementById('ghStatus').textContent = '';
  document.getElementById('ghStatus').style.color = 'var(--muted)';
  document.getElementById('githubModalOverlay').style.display = 'flex';
}
function closeGithubConfig(){
  document.getElementById('githubModalOverlay').style.display = 'none';
}
function saveGithubConfig(){
  const cfg = readGithubForm();
  const statusEl = document.getElementById('ghStatus');
  if(!cfg.token || !cfg.owner || !cfg.repo || !cfg.path){
    statusEl.textContent = 'Preencha token, usuário, repositório e caminho do arquivo.';
    statusEl.style.color = '#a24a3d';
    return;
  }
  saveGithubConfigObj(cfg);
  statusEl.textContent = '✅ Configuração salva neste navegador.';
  statusEl.style.color = '#3d8577';
  setTimeout(() => {
    closeGithubConfig();
    toast('✅ Configuração do GitHub salva.');
  }, 700);
}
async function testGithubConnection(){
  const cfg = readGithubForm();
  const statusEl = document.getElementById('ghStatus');
  if(!cfg.token || !cfg.owner || !cfg.repo || !cfg.path){
    statusEl.textContent = 'Preencha todos os campos antes de testar.';
    statusEl.style.color = '#a24a3d';
    return;
  }
  statusEl.textContent = 'Testando conexão...';
  statusEl.style.color = 'var(--muted)';
  try{
    const r = await fetch(`https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch}`, {
      headers:{ 'Authorization':'token '+cfg.token, 'Accept':'application/vnd.github.v3+json' },
      cache:'no-store'
    });
    if(r.ok){
      statusEl.textContent = '✅ Conexão OK — arquivo encontrado no repositório.';
      statusEl.style.color = '#3d8577';
    } else {
      const err = await r.json().catch(()=>({}));
      statusEl.textContent = '❌ ' + (err.message || ('Erro '+r.status+' ao acessar o arquivo.'));
      statusEl.style.color = '#a24a3d';
    }
  }catch(e){
    statusEl.textContent = '❌ Erro de rede: ' + e.message;
    statusEl.style.color = '#a24a3d';
  }
}

function b64EncodeUtf8(str){
  const bytes = new TextEncoder().encode(str);
  let bin = '';
  bytes.forEach(b => bin += String.fromCharCode(b));
  return btoa(bin);
}
function b64DecodeUtf8(b64){
  const bin = atob(b64.replace(/\n/g,''));
  const bytes = new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++) bytes[i] = bin.charCodeAt(i);
  return new TextDecoder('utf-8').decode(bytes);
}
async function fetchGithubFile(cfg){
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}?ref=${cfg.branch}&_=${Date.now()}`;
  const r = await fetch(url, {
    headers:{ 'Authorization':'token '+cfg.token, 'Accept':'application/vnd.github.v3+json' },
    cache:'no-store'
  });
  if(!r.ok){
    const err = await r.json().catch(()=>({}));
    throw new Error(err.message || ('Erro ao buscar arquivo ('+r.status+')'));
  }
  return r.json();
}
async function putGithubFile(cfg, content, sha, message){
  const url = `https://api.github.com/repos/${cfg.owner}/${cfg.repo}/contents/${cfg.path}`;
  const r = await fetch(url, {
    method:'PUT',
    headers:{ 'Authorization':'token '+cfg.token, 'Accept':'application/vnd.github.v3+json', 'Content-Type':'application/json' },
    body: JSON.stringify({ message, content: b64EncodeUtf8(content), sha, branch: cfg.branch })
  });
  if(!r.ok){
    const err = await r.json().catch(()=>({}));
    const e = new Error(err.message || ('Erro ao publicar ('+r.status+')'));
    e.status = r.status;
    throw e;
  }
  return r.json();
}
function buildSeedReplacement(){
  const dataForSeed = JSON.parse(JSON.stringify(state));
  return 'const seedState = ' + JSON.stringify(dataForSeed, null, 2) + ';';
}
async function publishToGithub(){
  if(!isAdmin) return;
  const cfg = loadGithubConfig();
  if(!cfg || !cfg.token || !cfg.owner || !cfg.repo || !cfg.path){
    toast('⚠️ Configure o GitHub primeiro (botão ⚙️ GitHub).');
    openGithubConfig();
    return;
  }
  const btn = document.getElementById('githubPublishBtn');
  const original = btn.textContent;
  btn.disabled = true;
  btn.textContent = 'Publicando...';
  try{
    const fileData = await fetchGithubFile(cfg);
    const currentSrc = b64DecodeUtf8(fileData.content);
    const seedRegex = /const seedState = \{[\s\S]*?\n\};(?=\s*\n+function loadState)/;
    if(!seedRegex.test(currentSrc)){
      throw new Error('Não encontrei o bloco de dados (seedState) no arquivo do repositório. Confirme o caminho do arquivo em ⚙️ GitHub.');
    }
    const newSrc = currentSrc.replace(seedRegex, buildSeedReplacement());
    try{
      await putGithubFile(cfg, newSrc, fileData.sha, 'Catálogo FAQ: atualização de conteúdo');
    }catch(err){
      if(err.status === 409){
        const fresh = await fetchGithubFile(cfg);
        await putGithubFile(cfg, newSrc, fresh.sha, 'Catálogo FAQ: atualização de conteúdo');
      } else {
        throw err;
      }
    }
    toast('✅ Publicado no GitHub! O GitHub Pages leva 1–2 min para atualizar.', 5500);
  }catch(e){
    console.error(e);
    toast('❌ '+e.message, 6500);
  }finally{
    btn.disabled = false;
    btn.textContent = original;
  }
}
document.getElementById('importFile').addEventListener('change', (e) => {
  if(!isAdmin){ e.target.value=''; return; }
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    try{
      const data = JSON.parse(ev.target.result);
      if(!data.sections) throw new Error('Formato inválido');
      if(!confirm('Importar este arquivo vai substituir o catálogo atual. Continuar?')) return;
      state = data;
      state.sections.forEach(s => { if(typeof s.expanded !== 'boolean') s.expanded = false; });
      selectedSectionId = null;
      selectedPageId = null;
      renderAll();
    }catch(err){
      alert('Não foi possível importar o arquivo: ' + err.message);
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

/* ---------------- Print catalog ---------------- */
function printCatalog(){
  const area = document.getElementById('print-area');
  let html = `<h1 style="font-family:'Cormorant Garamond',serif;color:#2c4f3a;">Catálogo de FAQ — Atendimento Tania Bulhões</h1>`;
  state.sections.forEach((s, sIdx) => {
    html += `<div class="print-section"><h2>${sIdx+1}. ${escapeHtml(s.name)}</h2>`;
    s.pages.forEach((p, pIdx) => {
      html += `<div class="print-page"><span class="pnum">${sIdx+1}.${pIdx+1}</span><h3>${escapeHtml(p.title)}</h3><div class="body">${p.content}</div></div>`;
    });
    if(s.pages.length===0) html += `<div class="print-page"><div class="body" style="color:#8a8577;">Sem temas cadastrados.</div></div>`;
    html += `</div>`;
  });
  area.innerHTML = html;
  window.print();
}

function renderAll(){
  renderTree();
  renderEditor();
  persist();
}
updateAdminUI();
renderAll();
